<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc Mừng Sinh Nhật Ba</title>

  <!-- Font đẹp -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Be+Vietnam+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Be Vietnam Pro", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 0, 0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 25%),
        linear-gradient(135deg, #08111f, #0f1d33, #16263f);
      color: #f8f8f8;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* nền lấp lánh */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.9);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    .card {
      width: 92%;
      max-width: 780px;
      padding: 45px 35px;
      border-radius: 28px;
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 215, 0, 0.18);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      text-align: center;
      animation: cardAppear 1.2s ease;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .gold-line {
      width: 120px;
      height: 3px;
      margin: 0 auto 22px;
      background: linear-gradient(to right, transparent, #ffd700, transparent);
      border-radius: 999px;
    }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: #ffd76a;
      text-shadow: 0 0 18px rgba(255, 215, 106, 0.28);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #e8edf7;
      margin-bottom: 28px;
      opacity: 0.95;
    }

    .message-box {
      text-align: left;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      line-height: 1.9;
      color: #f3f4f6;
      font-size: 1.05rem;
      min-height: 220px;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.03);
    }

    .message-box span.highlight {
      color: #ffd76a;
      font-weight: 600;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.28s ease;
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffd76a, #c99a2e);
      color: #101828;
      box-shadow: 0 10px 24px rgba(255, 215, 106, 0.25);
    }

    .btn-gold:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 16px 28px rgba(255, 215, 106, 0.35);
    }

    .btn-dark {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-dark:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }

    .footer {
      margin-top: 24px;
      color: #d6d9df;
      font-style: italic;
      font-size: 0.98rem;
    }

    /* confetti */
    .confetti {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      opacity: 0.95;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 1;
      }
    }

    /* glow circle */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,215,106,0.12), transparent 65%);
      border-radius: 50%;
      filter: blur(10px);
      z-index: 0;
    }

    .glow.one {
      top: -80px;
      left: -80px;
    }

    .glow.two {
      bottom: -80px;
      right: -80px;
    }

    /* responsive */
    @media (max-width: 768px) {
      .card {
        padding: 28px 18px;
      }
      .title {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .message-box {
        font-size: 0.98rem;
        min-height: 260px;
      }
    }
  </style>
</head>
<body>

  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="card">
    <div class="gold-line"></div>
    <h1 class="title">Chúc Mừng Sinh Nhật Ba</h1>
    <p class="subtitle">Một ngày thật đặc biệt dành cho người đàn ông tuyệt vời nhất trong gia đình ❤️</p>

    <div class="message-box" id="message"></div>

    <div class="actions">
      <button class="btn btn-gold" onclick="showWish()">Mở lời chúc 🎁</button>
      <button class="btn btn-dark" onclick="celebrate()">Pháo hoa 🎉</button>
    </div>

    <div class="footer">
      Thương ba thật nhiều 💛
    </div>
  </div>

  <script>
    // tạo sao lấp lánh
    function createSparkles() {
      for (let i = 0; i < 40; i++) {
        const s = document.createElement("div");
        s.classList.add("sparkle");
        s.style.left = Math.random() * window.innerWidth + "px";
        s.style.top = Math.random() * window.innerHeight + "px";
        s.style.animationDuration = (Math.random() * 3 + 2) + "s";
        s.style.animationDelay = (Math.random() * 2) + "s";
        document.body.appendChild(s);
      }
    }
    createSparkles();

    const text = `
Ba yêu quý,

Hôm nay là ngày thật đặc biệt — ngày sinh nhật của ba.
Con chúc ba luôn <span class="highlight">mạnh khỏe</span>, vui vẻ và bình an mỗi ngày.

Cảm ơn ba vì đã luôn là chỗ dựa vững chắc cho gia đình,
là người âm thầm hy sinh, lo lắng và yêu thương con bằng tất cả trái tim.

Bước sang tuổi mới, con mong ba sẽ luôn có thật nhiều niềm vui,
nhiều tiếng cười, nhiều sức khỏe và thật nhiều hạnh phúc bên gia đình mình.

<span class="highlight">Chúc mừng sinh nhật ba!</span>
Con yêu ba rất nhiều 💛
    `;

    let i = 0;
    let isTyping = false;

    function showWish() {
      if (isTyping) return;
      isTyping = true;

      const box = document.getElementById("message");
      box.innerHTML = "";
      let html = "";
      let index = 0;

      const temp = document.createElement("div");
      temp.innerHTML = text;
      const finalHTML = temp.innerHTML;

      function typeHTML() {
        if (index < finalHTML.length) {
          html += finalHTML[index];
          box.innerHTML = html;
          index++;
          setTimeout(typeHTML, 18);
        } else {
          isTyping = false;
        }
      }

      typeHTML();
    }

    function celebrate() {
      const colors = ["#ffd76a", "#ffffff", "#c99a2e", "#f7d774", "#e8c45c"];
      for (let i = 0; i < 140; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
      }
    }
  </script>
</body>
</html>
